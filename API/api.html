<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Open Food Facts Viewer</title>
  <link rel="stylesheet" href="api.css"/>
</head>
<body>

  <div class="container">
    <h1>Food Product Lookup</h1>

    <div class="search-box">
      <input type="text" id="barcodeInput" placeholder="Enter barcode (e.g. 7622210449283)"/>
      <button onclick="fetchProduct()">Search</button>
    </div>

    <div id="productInfo" class="product-card"></div>
  </div>

  <script src="api.js"></script>
</body>
</html>
