<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Inventory</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">

<div class="max-w-7xl mx-auto">

<h1 class="text-3xl font-bold text-center mb-8">Product Inventory</h1>

<!-- FILTER -->
<select id="categoryFilter" class="border p-2 rounded mb-6">
<option value="">All Categories</option>
<option value="electronics">Electronics</option>
<option value="jewelery">Jewelery</option>
<option value="men's clothing">Men's Clothing</option>
<option value="women's clothing">Women's Clothing</option>
</select>

<!-- ADD PRODUCT FORM -->
<form id="productForm" class="grid grid-cols-2 gap-4 mb-10 bg-white p-4 rounded shadow">

<input id="title" placeholder="Title" class="border p-2 rounded" required>
<input id="price" type="number" placeholder="Price" class="border p-2 rounded" required>

<input id="image" placeholder="Image URL" class="border p-2 rounded">
<input id="category" placeholder="Category" class="border p-2 rounded">

<textarea id="description" placeholder="Description" class="border p-2 rounded col-span-2"></textarea>

<button class="bg-blue-500 text-white p-2 rounded col-span-2">
Save Product
</button>

</form>

<!-- LOADING -->
<div id="loading" class="text-center hidden text-lg font-semibold">
Loading products...
</div>

<!-- EMPTY STATE -->
<div id="emptyState" class="text-center hidden text-gray-500">
No products found
</div>

<!-- PRODUCT GRID -->
<div id="productGrid" class="grid md:grid-cols-3 lg:grid-cols-4 gap-6"></div>

</div>

<script src="Index.js"></script>

</body>
</html>
